<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Staffing Requests - HR Manager</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/app-icons.css" th:href="@{/css/app-icons.css}"/>
    <script defer src="/js/app-icons.js" th:src="@{/js/app-icons.js}"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1414b8",
                        "primary-light": "#e8e8fb",
                        "bg-light": "#f6f6f8",
                    },
                    fontFamily: { display: ["Inter"] },
                },
            },
        };
    </script>
    <style>
        .nav-active { box-shadow: 0 0 0 1px #1414b830, inset 3px 0 0 #1414b8; }
    </style>
</head>
<body class="bg-bg-light font-display text-slate-900 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside th:replace="~{fragments/hrmanager-sidebar :: sidebar('staffing', ${currentUser})}"></aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
                <div>
                    <h2 class="text-base font-black text-slate-900 leading-tight">Staffing Requests</h2>
                    <p class="text-xs text-slate-400">Manage employee assignments and transfers</p>
                </div>
            </header>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-8 space-y-6">
                <!-- Success/Error Messages -->
                <div th:if="${successMsg}" class="p-4 bg-green-100 text-green-700 rounded-lg">
                    <span th:text="${successMsg}"></span>
                </div>
                <div th:if="${errorMsg}" class="p-4 bg-red-100 text-red-700 rounded-lg">
                    <span th:text="${errorMsg}"></span>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <div class="text-sm text-slate-600">Pending Requests</div>
                        <div class="text-3xl font-bold text-slate-900 mt-2" th:text="${pendingCount}">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <div class="text-sm text-slate-600">Available Employees</div>
                        <div class="text-3xl font-bold text-slate-900 mt-2" th:text="${availableEmployees.size()}">0</div>
                    </div>
                </div>

                <!-- Pending Requests -->
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
                    <div class="px-6 py-4 border-b border-slate-200">
                        <h2 class="text-lg font-semibold text-slate-900">Pending Staffing Requests</h2>
                    </div>
                    <div class="p-6">
                        <div th:if="${staffingRequests.isEmpty()}" class="text-center text-slate-500 py-8">
                            No pending requests
                        </div>
                        <div th:each="request : ${staffingRequests}" class="border border-slate-200 rounded-lg p-4 mb-4">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-2">
                                        <span class="px-3 py-1 text-xs font-semibold rounded-full"
                                              th:classappend="${request.requestType == 'RECRUITMENT' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}"
                                              th:text="${request.requestType}"></span>
                                        <span class="text-sm text-slate-600" th:text="${request.departmentName}"></span>
                                    </div>
                                    <h3 class="text-lg font-semibold text-slate-900 mb-1" th:text="${request.roleRequested}"></h3>
                                    <p class="text-sm text-slate-600 mb-2" th:text="${request.description}"></p>
                                    <div class="text-xs text-slate-500">
                                        Requested by: <span th:text="${request.requesterName}"></span>
                                        | <span th:text="${#temporals.format(request.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                                    </div>
                                </div>
                                <div class="ml-4 flex flex-col gap-2">
                                    <button onclick="openAssignModal(this)" 
                                            th:attr="data-request-id=${request.id}, data-role=${request.roleRequested}"
                                            class="px-4 py-2 bg-primary text-white text-sm rounded-lg hover:bg-primary/90">
                                        Assign Employee
                                    </button>
                                    <form th:action="@{/hr-manager/staffing-requests/{id}/reject(id=${request.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="px-4 py-2 bg-red-600 text-white text-sm rounded-lg hover:bg-red-700 w-full">
                                            Reject
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Available Employees -->
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
                    <div class="px-6 py-4 border-b border-slate-200">
                        <h2 class="text-lg font-semibold text-slate-900">Available Employees (Unassigned)</h2>
                    </div>
                    <div class="p-6">
                        <div th:if="${availableEmployees.isEmpty()}" class="text-center text-slate-500 py-8">
                            No unassigned employees
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <div th:each="emp : ${availableEmployees}" class="border border-slate-200 rounded-lg p-4">
                                <div class="flex items-center gap-3 mb-3">
                                    <img th:src="${emp.avatarUrl}" alt="Avatar" class="w-12 h-12 rounded-full">
                                    <div>
                                        <div class="font-semibold text-slate-900" th:text="${emp.fullName}"></div>
                                        <div class="text-sm text-slate-600" th:text="${emp.position}"></div>
                                    </div>
                                </div>
                                <div class="text-xs text-slate-500">
                                    <div th:text="${emp.employeeCode}"></div>
                                    <div th:text="${emp.email}"></div>
                                    <div>Hire Date: <span th:text="${#temporals.format(emp.hireDate, 'dd/MM/yyyy')}"></span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Assign Employee Modal -->
    <div id="assignModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 class="text-lg font-semibold mb-4">Assign Employee</h3>
            <form id="assignForm" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 mb-2">Role: <span id="modalRole" class="font-semibold"></span></label>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 mb-2">Select Employee</label>
                    <select name="employeeId" required class="w-full border border-slate-300 rounded-lg px-3 py-2">
                        <option value="">-- Select Employee --</option>
                        <option th:each="emp : ${availableEmployees}" 
                                th:value="${emp.id}" 
                                th:text="${emp.fullName + ' (' + emp.position + ')'}"></option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">
                        Assign
                    </button>
                    <button type="button" onclick="closeAssignModal()" class="flex-1 px-4 py-2 bg-slate-300 text-slate-700 rounded-lg hover:bg-slate-400">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openAssignModal(button) {
            const requestId = button.getAttribute('data-request-id');
            const role = button.getAttribute('data-role');
            document.getElementById('modalRole').textContent = role;
            document.getElementById('assignForm').action = '/hr-manager/staffing-requests/' + requestId + '/assign';
            document.getElementById('assignModal').classList.remove('hidden');
        }

        function closeAssignModal() {
            document.getElementById('assignModal').classList.add('hidden');
        }
    </script>
</body>
</html>
