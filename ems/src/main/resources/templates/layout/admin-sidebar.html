<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="adminSidebar"
       class="w-72 bg-white border-r border-slate-100 flex flex-col shrink-0 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-40 h-40 bg-primary/5 rounded-full -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

    <!-- Brand -->
    <div class="px-6 py-6 flex items-center gap-3 relative z-10">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-md shadow-primary/30">
            <span class="material-symbols-outlined text-[22px]">corporate_fare</span>
        </div>
        <div>
            <h1 class="text-base font-black tracking-tight text-slate-900">EMS Admin</h1>
            <p class="text-[11px] text-slate-400 font-medium">Employee Management System</p>
        </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 space-y-0.5 overflow-y-auto">
        <p class="px-3 pb-1 pt-1 text-[10px] font-bold text-slate-300 uppercase tracking-widest">Main</p>

        <!-- Dashboard -->
        <a th:href="@{/admin/dashboard}"
           th:class="${activeMenu=='dashboard' ? 'nav-active flex items-center gap-3 px-3 py-2.5 bg-primary-light text-primary rounded-xl transition-all'
                                               : 'flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all group'}">
            <span class="material-symbols-outlined"
                  th:classappend="${activeMenu=='dashboard' ? ' fill-icon text-[20px]' : ' text-[20px] text-slate-400 group-hover:text-primary transition-colors'}">
                dashboard
            </span>
            <span class="text-sm" th:classappend="${activeMenu=='dashboard' ? ' font-semibold' : ' font-medium'}">Dashboard</span>
        </a>

        <!-- Company -->
        <a th:href="@{/companies}"
           class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all group">
            <span class="material-symbols-outlined text-[20px] text-slate-400 group-hover:text-primary transition-colors">domain</span>
            <span class="text-sm font-medium">Company</span>
        </a>

        <!-- Departments -->
        <a th:href="@{/admin/departments}"
           class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all group">
            <span class="material-symbols-outlined text-[20px] text-slate-400 group-hover:text-primary transition-colors">account_tree</span>
            <span class="text-sm font-medium">Departments</span>
        </a>

        <!-- Roles -->
        <a th:href="@{/roles}"
           class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all group">
            <span class="material-symbols-outlined text-[20px] text-slate-400 group-hover:text-primary transition-colors">admin_panel_settings</span>
            <span class="text-sm font-medium">Roles &amp; Permissions</span>
        </a>

        <!-- Users -->
        <a th:href="@{/admin/users}"
           th:class="${activeMenu=='users' ? 'nav-active flex items-center gap-3 px-3 py-2.5 bg-primary-light text-primary rounded-xl transition-all'
                                           : 'flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all group'}">
            <span class="material-symbols-outlined"
                  th:classappend="${activeMenu=='users' ? ' fill-icon text-[20px]' : ' text-[20px] text-slate-400 group-hover:text-primary transition-colors'}">
                group
            </span>
            <span class="text-sm" th:classappend="${activeMenu=='users' ? ' font-semibold' : ' font-medium'}">User Accounts</span>
        </a>

        <p class="px-3 pb-1 pt-4 text-[10px] font-bold text-slate-300 uppercase tracking-widest">System</p>

        <!-- Logs -->
        <a th:href="@{/logs}"
           class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all group">
            <span class="material-symbols-outlined text-[20px] text-slate-400 group-hover:text-primary transition-colors">receipt_long</span>
            <span class="text-sm font-medium">System Logs</span>
            <span class="ml-auto text-[10px] font-bold text-rose-500 bg-rose-50 px-1.5 py-0.5 rounded-md">3</span>
        </a>

        <!-- Settings -->
        <a th:href="@{/settings}"
           class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all group">
            <span class="material-symbols-outlined text-[20px] text-slate-400 group-hover:text-primary transition-colors">settings</span>
            <span class="text-sm font-medium">Settings</span>
        </a>
    </nav>

    <!-- User card -->
    <div class="p-4">
        <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 flex items-center gap-3">
            <div class="w-9 h-9 rounded-full overflow-hidden bg-primary/10 flex items-center justify-center text-primary font-bold text-sm shrink-0">
                <img th:if="${currentUser != null and currentUser.avatarUrl != null}"
                     th:src="${currentUser.avatarUrl}" th:alt="${currentUser.fullName}"
                     class="w-full h-full object-cover" onerror="this.style.display='none'"/>
                <span th:if="${currentUser == null or currentUser.avatarUrl == null}"
                      th:text="${currentUser != null ? currentUser.initials : 'AR'}">AR</span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold text-slate-800 truncate"
                   th:text="${currentUser != null ? currentUser.fullName : 'Admin User'}">
                    Admin User
                </p>
                <p class="text-[11px] text-slate-400 truncate"
                   th:text="${currentUser != null ? currentUser.email : 'admin@example.com'}">
                    admin@example.com
                </p>
            </div>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit"
                        class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors">
                    <span class="material-symbols-outlined text-sm">logout</span>
                </button>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
        </div>
    </div>
</aside>

</body>
</html>
